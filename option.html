<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker</title>
    <!-- UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <header class="w-11/12 container mx-auto py-8">
      <h2 class="text-[50px] font-bold">Job Application Tracker</h2>
      <div class="flex gap-8">
        <div class="card w-96 bg-base-100 card-md shadow-sm">
          <div class="card-body">
            <h2 class="card-title">Totall</h2>
            <p class="">0</p>
          </div>
        </div>
        <div class="card w-96 bg-base-100 card-md shadow-sm">
          <div class="card-body">
            <h2 class="card-title">Interview</h2>
            <p class="text-green-500">0</p>
          </div>
        </div>
        <div class="card w-96 bg-base-100 card-md shadow-sm">
          <div class="card-body">
            <h2 class="card-title">Rejected</h2>
            <p class="text-red-500">0</p>
          </div>
        </div>
      </div>
    </header>
    <main>
      <section class="w-11/12 container mx-auto">
        <div class="flex justify-between py-5">
          <h2 class="text-[30px] font-bold">Available Jobs</h2>
          <p>0 jobs</p>
        </div>
        <div class="">
          <button class="btn">All</button>
          <button class="btn">Interview</button>
          <button class="btn">Rejected</button>
        </div>
      </section>
      <section class="w-11/12 container mx-auto">
          <div class="bg-base-100 shadow-md py-5 flex flex-col justify-center items-center">
            <img src="./asset/jobs.png" alt="">
            <h2 class="text-[30px] font-bold">No jobs available</h2>
            <p class="">Check back soon for new job opportunities</p>
          </div>
      </section>
    </main>
  </body>
</html>
